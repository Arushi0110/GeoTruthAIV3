services:
  # -----------------------------
  # 1️⃣ Node/Express API service
  # -----------------------------
  - type: web
    name: geotruth-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm run dev
    rootDir: server
    envVars:
      - key: MONGO_URI
        fromService:
          name: geotruthai-mongo
          type: redis
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ML_SERVICE_URL
        value: "https://geotruth-ml-service.onrender.com"

  # -----------------------------
  # 2️⃣ FastAPI ML service
  # -----------------------------
  - type: web
    name: geotruth-ml-service
    env: python
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    rootDir: ml-service
    envVars:
      - key: MONGO_URI
        fromService:
          name: geotruthai-mongo
          type: redis
      - key: FRONTEND_URL
        sync: false

  # -----------------------------
  # 3️⃣ MongoDB
  # -----------------------------
  - type: redis
    name: geotruthai-mongo
    plan: free
    region: oregon
    ipAllowList: []
